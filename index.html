<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Enervee Projects</title>

    <link rel="stylesheet" href="assets/style.css" type="text/css">
    <link rel="stylesheet" href='http://fonts.googleapis.com/css?family=Roboto:300' type='text/css'>

    <style>
    * {
    	margin: 0;
    	padding: 0;
    }

    html, body {
    	font-family: 'Roboto', sans-serif;
    }

    body {
    	padding: 20px;
    }

    ul.projects {
    	overflow: hidden;
    	list-style: none;
    	list-style-type: none;
    }

    ul.projects li {
    	display: block;
    	float: left;
    	width: 20px;
    	height: 20px;
    	border-radius: 4px;
    	overflow: hidden;
    	margin-right: 10px;
    	margin-bottom: 10px;
    }

    ul.projects li.break {
    	clear: both;
    }

    ul.projects li a {
    	display: block;
    	width: 100%;
    	height: 100%;
    	background-color: #999999;
    }

    ul.projects li a.enervee {
    	background-color: #8957d8;
    }

    ul.projects li a.pge {
    	background-color: #ffa100;
    }

    ul.projects li a.energizect {
    	background-color: #138f4b;
    }

    ul.projects li a.duke-energy {
    	background-color: #26bcd7;
    }

    ul.projects li a.ladwp {
    	background-color: #0089db;
    }
    </style>
</head>

<body>
	<ul class="projects">
		<li class="break"><a href="enervee/index.html" class="enervee"></a></li>
		<li class="break"><a href="pge/index.html" class="pge"></a></li>
		<li><a href="energizect/index.html" class="energizect"></a></li>
		<li><a href="duke-energy/index.html" class="duke-energy"></a></li>
		<li><a href="ladwp/index.html" class="ladwp"></a></li>
	</ul>
</body>
</html>
